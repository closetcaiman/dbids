services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_server
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Admin!1234"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./northwind/sql/mssql:/data/sql
      - ./scripts/setup-mssql.sh:/data/setup-mssql.sh
    entrypoint: /bin/bash /data/setup-mssql.sh

  postgres:
    image: postgres:16
    container_name: postgres_server
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./northwind/sql/postgres/pg_north_ddl_data.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  sqlite:
    image: alpine
    container_name: sqlite_server
    command: sh -c "sh /data/setup-sqlite.sh && tail -f /dev/null"
    volumes:
      - ./northwind/db/sqlite:/data/db
      - ./northwind/sql/sqlite:/data/sql
      - ./scripts/setup-sqlite.sh:/data/setup-sqlite.sh
    working_dir: /data

volumes:
  mssql_data:
  postgres_data:
